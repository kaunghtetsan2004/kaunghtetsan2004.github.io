<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Romantic Memory Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css" />
    <script src="javaScript/script.js"></script>

    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <script src="fontawesome/js/all.min.js"></script>


</head>

<body>

    <div class="floating-hearts"></div>

    <header>
        <div class="overlay"></div>

        <div class="hero-content">
            <h1>Forever & Always ❤️</h1>
            <p>Every moment with you becomes my favorite memory.</p>

            <div class="counter-box">
                <span>Together For</span>
                <h2 id="days">0</h2>
                <small>Days of Love</small>
            </div>

            <a href="#gallery" class="hero-btn">View Memories</a>
        </div>
    </header>

    <div class="container my-5 pt-md-5 " id="gallery">
        <div class="text-center">
            <h2>
                Our <span class="text-col">Memories</span>
            </h2>
            <div class="underline mx-auto my-3"></div>
        </div>


        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mt-4 ">
            <div class="col mb-3 ">
                <div class="card text-center border-0">
                    <div class="heart mx-auto">
                        <img src="assets/cp1.jpg" alt="" class="card-img-top">
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <a href="" class=" col-btn">Watch 2024</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col mb-3 ">
                <div class="card text-center border-0">
                    <div class="heart mx-auto">
                        <img src="assets/cp2.jpg" alt="" class="card-img-top">
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <a href="" class=" col-btn">Watch 2025</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col mb-3 ">
                <div class="card text-center border-0">
                    <div class="heart mx-auto">
                        <img src="assets/cp3.jpg" alt="" class="card-img-top">
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <a href="" class=" col-btn">Watch 2026</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <section>
        <div class="container text-center">
            <div class="row my-5">
                <div class="col">
                    <img src="assets/p1.jpg" alt="" class=" circle mb-3">
                    <p class="pf-col ">Name: <span class="text-black">Kaung Htet San</span></p>
                    <p class="pf-col ">Age: <span class="text-black" id="age">0</span></p>
                    <p class="pf-col">Birthday: <span class="text-black">22/11/2004</span></p>
                </div>
                <div class="col">
                    <img src="assets/m3.jpg" alt="" class=" circle mb-3">
                    <p class="pf-col ">Name: <span class="text-black">Aye Nyein San</span></p>
                    <p class="pf-col ">Age: <span class="text-black" id="ages">0</span></p>
                    <p class="pf-col">Birthday: <span class="text-black">02/11/2002</span></p>
                </div>                
            </div>
        </div>
    </section>

</body>

</html>
