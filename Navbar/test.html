<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout</title>

<link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
<script src="bootstrap/js/bootstrap.bundle.min.js"></script>

<!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->

<style>
body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.payment-box{
    background:white;
    border-radius:20px;
    padding:40px;
    width:100%;
    max-width:900px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}
.payment-method{
    cursor:pointer;
    border:2px solid #eee;
    border-radius:12px;
    padding:15px;
    text-align:center;
    transition:0.3s;
}
.payment-method:hover{
    border-color:#0d6efd;
}
.payment-method.active{
    border-color:#0d6efd;
    background:#f0f7ff;
}
.hidden{
    display:none;
}
.success-box{
    display:none;
}
</style>
</head>

<body>

<div class="payment-box">

<div id="paymentSection">
<div class="row">
    
    <!-- Left -->
    <div class="col-md-6">
        <h3 class="mb-4">Choose Payment Method</h3>

        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="payment-method active" onclick="selectMethod('card', this)">
                    💳 Card
                </div>
            </div>
            <div class="col-6">
                <div class="payment-method" onclick="selectMethod('kbz', this)">
                    KBZPay
                </div>
            </div>
            <div class="col-6">
                <div class="payment-method" onclick="selectMethod('wave', this)">
                    WavePay
                </div>
            </div>
            <div class="col-6">
                <div class="payment-method" onclick="selectMethod('aya', this)">
                    AYA Pay
                </div>
            </div>
        </div>

        <!-- Card Form -->
        <div id="cardForm">
            <input type="text" class="form-control mb-3" id="cardName" placeholder="Cardholder Name">
            <input type="text" class="form-control mb-3" id="cardNumber" placeholder="Card Number">
            <div class="row">
                <div class="col-6">
                    <input type="text" class="form-control mb-3" id="expiry" placeholder="MM/YY">
                </div>
                <div class="col-6">
                    <input type="password" class="form-control mb-3" id="cvv" placeholder="CVV">
                </div>
            </div>
        </div>

        <!-- Mobile Pay Info -->
        <div id="mobilePayInfo" class="hidden">
            <div class="alert alert-info">
                Enter your phone number linked to selected wallet.
            </div>
            <input type="text" class="form-control mb-3" id="phone" placeholder="09xxxxxxxxx">
        </div>

        <button class="btn btn-primary w-100 mt-3" onclick="processPayment()">
            Pay Now
        </button>

        <div id="message" class="mt-3"></div>
    </div>

    <!-- Right -->
    <div class="col-md-6">
        <h3 class="mb-4">Order Summary</h3>

        <ul class="list-group mb-3">
            <li class="list-group-item d-flex justify-content-between">
                Product 1 <strong>$50</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
                Product 2 <strong>$30</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
                Shipping <strong>$10</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between bg-light">
                <strong>Total</strong> <strong>$90</strong>
            </li>
        </ul>

        <div class="alert alert-success">
            🔒 Secure SSL Encrypted Payment
        </div>
    </div>

</div>
</div>

<!-- Success Screen -->
<div id="successSection" class="success-box text-center">
    <h2 class="text-success">🎉 Payment Successful!</h2>
    <p class="mt-3">Thank you for your purchase.</p>
    <button class="btn btn-primary mt-3" onclick="location.reload()">Make Another Payment</button>
</div>

</div>

<script>
let selectedMethod = "card";

function selectMethod(method, element){
    selectedMethod = method;

    document.querySelectorAll(".payment-method").forEach(btn=>{
        btn.classList.remove("active");
    });
    element.classList.add("active");

    if(method === "card"){
        document.getElementById("cardForm").classList.remove("hidden");
        document.getElementById("mobilePayInfo").classList.add("hidden");
    }else{
        document.getElementById("cardForm").classList.add("hidden");
        document.getElementById("mobilePayInfo").classList.remove("hidden");
    }
}

function processPayment(){
    let message = document.getElementById("message");
    message.innerHTML = "";

    if(selectedMethod === "card"){
        let name = document.getElementById("cardName").value;
        let number = document.getElementById("cardNumber").value;
        let expiry = document.getElementById("expiry").value;
        let cvv = document.getElementById("cvv").value;

        if(!name || !number || !expiry || !cvv){
            message.innerHTML = "<div class='alert alert-danger'>Please fill all card details.</div>";
            return;
        }
    }else{
        let phone = document.getElementById("phone").value;
        if(!phone || phone.length < 9){
            message.innerHTML = "<div class='alert alert-danger'>Enter valid phone number.</div>";
            return;
        }
    }

    message.innerHTML = "<div class='alert alert-warning'>Processing Payment...</div>";

    setTimeout(()=>{
        document.getElementById("paymentSection").style.display="none";
        document.getElementById("successSection").style.display="block";
    },2000);
}
</script>

</body>
</html>
