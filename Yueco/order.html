    <script>
        window.addEventListener('scroll', function () {
            const navbar = document.getElementById('mainNav');

            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        document.getElementById('year').innerHTML = new Date().getFullYear();
    </script>

    <script>
document.getElementById("form").addEventListener("submit", function (e) {
    e.preventDefault();

    // Form data
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const rollno = document.getElementById("rollno").value;
    const major = document.getElementById("major").value;
    const total = document.getElementById("total").innerText;

    // Get table data
    let orderDetails = "";
    const rows = document.querySelectorAll("#shopTbody tr");

    rows.forEach((row, index) => {
        const cols = row.querySelectorAll("td");

        orderDetails += `
${index + 1}. ${cols[1]?.innerText || ""}
   Price : ${cols[2]?.innerText || ""}
   Color : ${cols[3]?.innerText || ""}
   Size  : ${cols[4]?.innerText || ""}
   Qty   : ${cols[5]?.innerText || ""}
   SubTotal : ${cols[6]?.innerText || ""}
`;
    });

    // Final message
    const message = `
🛒 NEW ORDER

👤 Name : ${name}
📞 Phone : ${phone}
🎓 Roll No : ${rollno}
📚 Major : ${major}

━━━━━━━━━━━━━━
📦 ORDER ITEMS
━━━━━━━━━━━━━━
${orderDetails}

💰 TOTAL : ${total}
`;

    // Open Telegram with message
    const telegramUsername = "VIPER2005"; // without @

    const telegramUrl =
        `https://t.me/${telegramUsername}?text=${encodeURIComponent(message)}`;

    window.open(telegramUrl, "_blank");
});
</script>
