        </div>
        <!-- Upload Screenshot -->

            <i class="fa-solid fa-cloud-arrow-up"></i>

  <script>
    function changeColor(color) {

      const carouselImages = document.getElementById("carouselImages");

      if (color === "black") {

        carouselImages.innerHTML = `
        <div class="carousel-item active">
            <img src="assets/PNGs-01.png" class="d-block w-100">
        </div>

        <div class="carousel-item">
            <img src="assets/PNGs-02.png" class="d-block w-100">
        </div>
       
        `;
      }

      if (color === "white") {

        carouselImages.innerHTML = `
        <div class="carousel-item active">
            <img src="assets/PNGs-03.png" class="d-block w-100">
        </div>

        <div class="carousel-item">
            <img src="assets/PNGs-04.png" class="d-block w-100">
        </div>
     
        `;
      }
    }
  </script>


  <script>
    window.addEventListener('scroll', function () {
      const navbar = document.getElementById('mainNav');

      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });

    document.getElementById('year').innerHTML = new Date().getFullYear();
  </script>

  <!-- bootsrap -->
  <script src="bootstrap/js/bootstrap.min.js"></script>

  <!-- fontawesome -->
  <script src="fontawesome/js/all.min.js"></script>

  <!-- js -->
  <script src="javaScript/style.js"></script>
  <script src="javaScript/detail.js"></script>

  <script>
    const BOT_TOKEN = "8702870446:AAEHuJzHNSwzwmUW5AppyzVfWdxuyegb04U";
    const CHAT_ID = "5238671696";
    const qr = document.getElementById('qrImage');
    document.querySelectorAll('input[name="payment"]').forEach(r => {
      r.addEventListener('change', () => {
        qr.src = r.value === 'kpay' ? 'assets/kpay.png' : 'assets/wavemoney.jpg';
      });
    });
    document.getElementById('orderForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const payment = document.querySelector('input[name="payment"]:checked').value;
      const msg = `NEW ORDER%0AName: ${customerName.value}%0APhone: ${phone.value}%0ARoll No: ${rollno.value}%0AMajor: ${major.value}%0APayment: ${payment}`;
      if (BOT_TOKEN.includes('PASTE')) {
        alert('Add Telegram BOT_TOKEN and CHAT_ID in ordernow.html');
        return;
      }
      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}`);
      alert('Order submitted');
    });
  </script>
